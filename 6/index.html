<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<title>Lista Aluno</title>
</head>
<body>
<div class="container mt-5">
  <h1 class="text-center">Lista Aluno</h1>
  <table class="table" id="table-alunos">
    <thead>
      <tr>
        <th scope="col">nome</th>
        <th scope="col">cpf</th>
        <th scope="col">matricula</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>

  <form id="form-inserir">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" class="form-control" id="nome" name="nome" required>
    </div>
    <div class="form-group">
      <label for="cpf">Email</label>
      <input type="email" class="form-control" id="cpf" name="cpf" required>
    </div>
    <div class="form-group">
      <label for="matricula">Matricula</label>
      <input type="text" class="form-control" id="matricula" name="matricula" required>
    </div>
    <button type="submit" class="btn btn-primary">Enviar</button>
  </form>

  <div id="msg" class="mt-3"></div>
</div>

<script>
const API_LIST = 'listar.php';
const API_INSERT = 'inserir.php';
const API_DELETE = 'deletar.php';

function montarLinha(aluno){
  const tr = document.createElement('tr');
  tr.innerHTML = `<th scope="row">${aluno.nome}</th>
                  <th>${aluno.cpf}</th>
                  <th>${aluno.matricula}</th>
                  <th><button class="btn btn-danger btn-sm btn-delete" data-id="${aluno.id}">Deletar</button></th>`;
  return tr;
}

function carregar(){
  fetch(API_LIST)
    .then(r=>r.json())
    .then(data=>{
      const tbody = document.querySelector('#table-alunos tbody');
      tbody.innerHTML = '';
      if(Array.isArray(data)){
        data.forEach(aluno=> tbody.appendChild(montarLinha(aluno)));
      }
    })
    .catch(()=>{});
}

document.addEventListener('click', e=>{
  if(e.target.matches('.btn-delete')){
    const id = e.target.getAttribute('data-id');
    fetch(API_DELETE, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})})
      .then(r=>r.json())
      .then(resp=>{
        if(resp.success) carregar();
        else mostrarMensagem(resp.error || 'erro');
      })
      .catch(()=> mostrarMensagem('erro na requisição'));
  }
});

document.getElementById('form-inserir').addEventListener('submit', function(e){
  e.preventDefault();
  const form = e.target;
  const data = {
    nome: form.nome.value.trim(),
    cpf: form.cpf.value.trim(),
    matricula: form.matricula.value.trim()
  };
  fetch(API_INSERT, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(resp=>{
    if(resp.success){
      mostrarMensagem('valor adicionado!');
      form.reset();
      carregar();
    } else {
      mostrarMensagem(resp.error || 'erro');
    }
  })
  .catch(()=> mostrarMensagem('erro na requisição'));
});

function mostrarMensagem(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  setTimeout(()=> el.textContent = '', 4000);
}

carregar();
</script>
</body>
</html>
